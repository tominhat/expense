<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Paying</title>

  <link rel="stylesheet" href="../css/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="../css/bootstrap-icons-1.13.1/bootstrap-icons.css">
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/paying.css" />
</head>

<body>
  <div class="container py-4">
    <div class="card app-card shadow">
      <div class="card-body p-4">
        <h4 class="mb-4">Paying</h4>
         <div class="mt-4">
          <!-- <h6>Pending List</h6> -->
          <div id="pendingTjList"></div>
        </div>

        <form id="payingForm">
         <div class="row">

          <div class="col-6 mb-3">

            <label class="form-label">
              Transaction Date
            </label>

           <input
            type="text"
            id="tjDt"
            class="form-control"
            placeholder="dd/MM/yyyy"
            required
          />

          </div>

          <div class="col-6 mb-3">

            <label class="form-label">
              Payer
            </label>

            <select
              id="payer"
              class="form-select"
              required
            ></select>

          </div>

        </div>
        <div class="row">
  
          <div class="col-7 mb-3">
            <label class="form-label">What</label>

            <input
              type="text"
              id="what"
              class="form-control"
              required
            />
          </div>

         <div class="col-5 mb-3 position-relative">

          <label class="form-label">Amount</label>

          <input
            type="number"
            id="amt"
            class="form-control"
            min="1"
            autocomplete="off"
            required
          />

          <div
            class="amount-suggest"
            id="amountSuggest"
          ></div>

        </div>
          <div class="mb-4">
            <label class="form-label">Exception</label>
            <select id="exc" class="form-select" multiple></select>
          </div>

          <button type="button" class="btn btn-outline-primary w-100" onclick="addTempTj()">
            Add
          </button>


          <button type="button" class="btn btn-main w-100 mt-2" onclick="saveTjList(event)">
            Save to cloud
          </button>
        </form>
       
        <!-- <button type="button" class="btn btn-outline-secondary w-100 mt-2" onclick="goBackHome()">
          Back
        </button> -->
      </div>
    </div>
  </div>

  <div class="toast-container position-fixed top-0 end-0 p-3">
    <div id="successToast" class="toast align-items-center text-bg-success border-0" role="alert">
      <div class="d-flex">
        <div class="toast-body">
          Saved successfully
        </div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
      </div>
    </div>
  </div>

  <script src="../js/bootstrap/bootstrap.bundle.min.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/component/loading.js"></script>

  <script src="../js/paying.js"></script>
  <script src="../js/component/header.js"></script>
  <script src="../js/component/navbar.js"></script>

</body>
</html>
