<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Period Management</title>

  <link rel="stylesheet" href="../css/bootstrap/bootstrap.min.css" />
  <link rel="stylesheet" href="../css/bootstrap-icons-1.13.1/bootstrap-icons.css">
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/period.css" />
</head>

<body>
  <div class="container py-4">
    <div class="card app-card shadow">
      <div class="card-body p-4">
        <div class="d-flex justify-content-between align-items-center gap-2 mb-3">
          <h4 class="mb-0">Period Management</h4>

          <button
            type="button"
            class="btn btn-outline-primary btn-sm flex-shrink-0"
            onclick="refreshPeriodList()"
          >
            Refresh
          </button>
        </div>

        <button
          type="button"
          class="btn btn-main w-100 mb-3"
          data-bs-toggle="modal"
          data-bs-target="#openPeriodModal"
        >
          Open Period
        </button>

        <div id="periodList" class="period-list"></div>
      </div>
    </div>
  </div>


  <!-- modal open period -->
  <div class="modal fade" id="openPeriodModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <form id="openPeriodForm">
          <div class="modal-header">
            <h5 class="modal-title">Open New Period</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>

          <div class="modal-body">
            <div class="mb-3">
              <label class="form-label">Start Date</label>
              <input type="date" id="stDt" class="form-control" required />
            </div>

            <div class="mb-3">
              <label class="form-label">Note</label>
              <input type="text" id="note" class="form-control" />
            </div>
          </div>

          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
              Cancel
            </button>
            <button type="submit" class="btn btn-primary">
              Confirm Open
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- modal show action list -->
   <div class="modal fade" id="periodActionModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="periodActionTitle">Period</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
                <div id="calPrdList" class="cal-prd-list mb-3"></div>

                <button class="btn btn-primary w-100 mb-2" onclick="goTransactionList()">
                Xem chi tiêu
                </button>

                <button class="btn btn-warning w-100" onclick="confirmEndPeriod()">
                Kết thúc kỳ
                </button>
            </div>
            </div>
        </div>
    </div>


  <script src="../js/bootstrap/bootstrap.bundle.min.js"></script>
  <script src="../js/config.js"></script>
    <script src="../js/app.js"></script>
  <script src="../js/auth.js"></script>
    <script src="../js/component/header.js"></script>
  <script src="../js/component/navbar.js"></script>
  <script src="../js/component/loading.js"></script>
  <script src="../js/period.js"></script>



</body>
</html>
